events {}

http {
    resolver 127.0.0.11 valid=10s;

    server {
        listen 80;
        server_name _; 

        # ------------------------------------------------
        # 1. Main Dash App (The Default Fallback)
        # ------------------------------------------------
        location / {
            proxy_pass http://dash-app:8050;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ------------------------------------------------
        # 2. Auth Check (Internal)
        # ------------------------------------------------
        location = /_auth_check {
            # internal; # Uncomment this in production
            proxy_pass http://dash-app:8050/_auth_check;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header Cookie $http_cookie;
        }

        # ------------------------------------------------
        # 3. App Preview (The Main Entry Point)
        # ------------------------------------------------
        location /preview/ {
            auth_request /_auth_check;
            auth_request_set $target_host $upstream_http_x_target_host;

            proxy_intercept_errors on;
            error_page 502 503 504 = @loading_screen;
            error_page 404 500 = @select_repo_screen;

            # Rewrite Base HREF so Angular Router works
            proxy_set_header Accept-Encoding "";
            sub_filter '<base href="/"/>' '<base href="/preview/"/>';
            sub_filter '<base href="/">' '<base href="/preview/">';
            sub_filter_once on;
            sub_filter_types text/html;

            # Rewrite path: /preview/foo -> /foo
            rewrite ^/preview/(.*) /$1 break;
            
            proxy_pass http://$target_host:4200;
            proxy_set_header Host $host;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # ------------------------------------------------
        # 4. FIX: Trap "Leaked" Angular Assets
        # ------------------------------------------------
        location /assets/ {
            # Check auth so random people can't steal assets
            auth_request /_auth_check;
            auth_request_set $target_host $upstream_http_x_target_host;

            # Send directly to the user container
            proxy_pass http://$target_host:4200;
            proxy_set_header Host $host;
        }

        # ------------------------------------------------
        # 5. FIX: Trap Angular WebSockets (Hot Reload)
        # ------------------------------------------------
        location /ng-cli-ws {
            auth_request /_auth_check;
            auth_request_set $target_host $upstream_http_x_target_host;

            proxy_pass http://$target_host:4200;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
        }

        # ------------------------------------------------
        # 6. Loading Screen
        # ------------------------------------------------
        location @loading_screen {
            root /usr/share/nginx/html;
            try_files /loading.html =502;
            internal;
        }

        location @select_repo_screen {
            root /usr/share/nginx/html;
            try_files /loading.html =404;
            internal;
        }
    }
}