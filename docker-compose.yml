services:
  # 1. Your Dash Control Plane
  dash-app:
    build: .
    container_name: control-plane
    restart: always
    volumes:
      # CRITICAL: Give the app access to the Host's Docker Daemon
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - FLASK_SECRET_KEY=${FLASK_SECRET_KEY}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      # Tell the app which network to attach user containers to
      - DOCKER_NETWORK_NAME=app-net 
    networks:
      - app-net

  # 2. The Nginx Reverse Proxy
  nginx:
    image: jonasal/nginx-certbot:latest
    container_name: gateway
    restart: always
    ports:
      - "80:80"
      - "443:443"
    environment:
      - CERTBOT_EMAIL=${CERTBOT_EMAIL}
      - DOMAIN=${DOMAIN}
      - USE_LOCAL_CA=${USE_LOCAL_CA}
    volumes:
      - ./nginx_conf/default.conf.template:/etc/nginx/templates/default.conf.template:ro
      - letsencrypt_data:/etc/letsencrypt
      - ./loading.html:/usr/share/nginx/html/loading.html:ro
    networks:
      - app-net
    depends_on:
      - dash-app

# 3. The Shared Network
networks:
  app-net:
    name: app-net
    driver: bridge

volumes:
  letsencrypt_data: