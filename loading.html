<!DOCTYPE html>
<html>
<head>
    <title>Building App...</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding-top: 50px; background: #f8f9fa; }
        .spinner { margin: 20px auto; width: 50px; height: 50px; border: 5px solid #ccc; border-top-color: #007bff; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
    <script>
        // Check if app is ready every 3 seconds
        setTimeout(function() {
            location.reload();
        }, 3000);
    </script>
</head>
<body>
    <div class="spinner"></div>
    <h2>App is Starting...</h2>
    <p>Please wait while your environment is prepared.</p>
</body>
</html>
